services:
  db:
    image: postgres:16-alpine
    container_name: soyuz-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soyuz-api
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate:up && npm start"
    ports:
      - "4000:4000"
    volumes:
      # Volumen persistente para archivos entregables subidos por el admin.
      # Los archivos sobreviven reinicios y rebuilds del contenedor.
      - uploads_data:/app/uploads/deliverables
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    stop_grace_period: 15s

volumes:
  pgdata:
  uploads_data: